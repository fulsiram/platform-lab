apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: clone-and-build-nixos-image
spec:
  params:
    - name: repo-url
      type: string
  workspaces:
    - name: data

  tasks:
    - name: fetch-source
      taskRef:
        resolver: hub
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: version
            value: "0.9"
      workspaces:
        - name: output
          workspace: data
      params:
        - name: url
          value: $(params.repo-url)

    - name: nixos-build-image
      runAfter: ["fetch-source"]
      taskRef:
        kind: Task
        name: nixos-build-image
      workspaces:
        - name: source
          workspace: data
      params:
        - name: flakePath
          value: ".#akaiaImages"
        - name: imageVariant
          value: kubevirt
        - name: outputFile
          value: test

    - name: build-push-rootdisk
      runAfter: ["nixos-build-image"]
      taskRef:
        kind: Task
        name: buildkit-build-push
      workspaces:
        - name: source
          workspace: data
      params:
        - name: DOCKERFILE
          value: Dockerfile.containerdisk
        - name: IMAGE
          value: harbor.salami.network/kubevirt-rootdisks/nixos:latest
        - name: BUILD_ARGS
          value: --opt build-arg:DISK_FILE=root.qcow2

    - name: build-push-nixdisk
      runAfter: ["nixos-build-image"]
      taskRef:
        kind: Task
        name: buildkit-build-push
      workspaces:
        - name: source
          workspace: data
      params:
        - name: DOCKERFILE
          value: Dockerfile.containerdisk
        - name: IMAGE
          value: harbor.salami.network/kubevirt-rootdisks/nixos-nix:latest
        - name: BUILD_ARGS
          value: --opt build-arg:DISK_FILE=nix.qcow2

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nixos-build-image
spec:
  params:
    - name: flakePath
      type: string
    - name: imageVariant
      type: string
    - name: outputFile
      type: string
  workspaces:
    - name: source
  volumes:
    - name: nix-cache
      persistentVolumeClaim:
        claimName: nixos-nix-cache
  steps:
    - name: seed-nix-cache
      image: nixos/nix:2.33.5
      volumeMounts:
        - name: nix-cache
          mountPath: /nix-cache
      resources: {}
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        if [ ! -e /nix-cache/store ]; then
          cp -a /nix/. /nix-cache/
        fi
    - name: build
      image: nixos/nix:2.33.5
      resources: {}
      volumeMounts:
        - name: nix-cache
          mountPath: /nix
      env:
        - name: NIX_CONFIG
          value: |
            experimental-features = nix-command flakes
            system-features = kvm benchmark big-parallel nixos-test uid-range
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        export HOME=/tmp
        mkdir -p "$HOME/.config/git"
        cat > "$HOME/.config/git/config" <<EOF
        [safe]
          directory = *
        EOF

        cd $(workspaces.source.path)

        nix build $(params.flakePath) -o ./out --print-out-paths --max-jobs auto --cores 0
        ls -la ./out
        ls -la ./out/

        cp -L ./out/* .

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildkit-build-push
spec:
  params:
    - name: IMAGE
      type: string
    - name: DOCKERFILE
      type: string
      default: Dockerfile
    - name: CONTEXT
      type: string
      default: .
    - name: BUILD_ARGS
      type: string
      default: ""
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: moby/buildkit:v0.29.0
      workingDir: $(workspaces.source.path)
      resources: {}
      securityContext:
        privileged: true
      script: |
        #!/usr/bin/env sh
        set -eu
        buildctl-daemonless.sh build \
          --frontend=dockerfile.v0 \
          --opt filename=$(params.DOCKERFILE) \
          --local context=$(params.CONTEXT) \
          --local dockerfile=$(params.CONTEXT) \
          $(params.BUILD_ARGS) \
          --output type=image,name=$(params.IMAGE),push=true

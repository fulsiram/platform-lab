apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: devboxes.platform.salami.network
spec:
  scope: Namespaced
  group: platform.salami.network
  names:
    kind: Devbox
    plural: devboxes
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                powerState:
                  type: string
                  default: Running
                  enum:
                    - Running
                    - Stopped
                exposedPorts:
                  type: array
                  items:
                    type: integer
                diskGenerations:
                  type: object
                  default:
                    root: 1
                    nixStore: 1
                  properties:
                    root:
                      type: integer
                      default: 1
                      minimum: 1
                    nixStore:
                      type: integer
                      default: 1
                      minimum: 1
                  required:
                    - root
                    - nixStore
                authorizedKeysConfigMapRef:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
              required:
                - diskGenerations
                - authorizedKeysConfigMapRef
            status:
              type: object
              properties:
                address:
                  type: string
                yggdrasilAddress:
                  type: string
                yggdrasilPubkey:
                  type: string
      additionalPrinterColumns:
        - name: Owner
          type: string
          jsonPath: .metadata.annotations['platform\.salami\.network/owner']
        - name: Address
          type: string
          jsonPath: .status.address

gitea:
  config:
    database:
      DB_TYPE: postgres
      HOST: forgejo-db-rw
      USER: forgejo
      NAME: forgejo
  additionalConfigFromEnvs:
    - name: FORGEJO__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-db-app
          key: password

httpRoute:
  enabled: true
  parentRefs:
    - name: gateway
      namespace: gateway-infra
      sectionName: https-wildcard
  hostnames:
    - git.salami.network

tcpRoute:
  enabled: true
  parentRefs:
    - name: gateway
      namespace: gateway-infra
      sectionName: ssh

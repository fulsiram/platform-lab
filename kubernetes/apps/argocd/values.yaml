global:
  domain: argocd.salami.network

configs:
  cm:
    kustomize.buildOptions: --enable-helm
  params:
    server.insecure: true

server:
  httproute:
    enabled: true
    hostnames:
      - argocd.salami.network
    parentRefs:
      - name: gateway
        namespace: gateway-infra
        sectionName: https-wildcard

  grpcroute:
    enabled: false
    parentRefs:
      - name: gateway
        namespace: gateway-infra
        sectionName: https-wildcard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbird-server-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-server
  labels:
    app.kubernetes.io/name: netbird-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbird-server
    spec:
      initContainers:
        - name: render-config
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null
              envsubst '$NB_AUTH_SECRET $NB_STORE_ENCRYPTION_KEY $NB_STORE_DSN $NB_ACTIVITY_DSN $NB_AUTHSTORE_DSN' \
                < /tpl/config.yaml.tmpl > /etc/netbird/config.yaml
              echo "rendered config:"
              grep -vE 'dsn|authSecret|encryptionKey' /etc/netbird/config.yaml
          env:
            - name: NB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: netbird-db-app
                  key: username
            - name: NB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: netbird-db-app
                  key: password
            - name: NB_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: netbird-server-secrets
                  key: authSecret
            - name: NB_STORE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-server-secrets
                  key: storeEncryptionKey
            - name: NB_STORE_DSN
              value: "host=netbird-db-rw port=5432 user=$(NB_DB_USER) password=$(NB_DB_PASS) dbname=netbird sslmode=require"
            - name: NB_ACTIVITY_DSN
              value: "host=netbird-db-rw port=5432 user=$(NB_DB_USER) password=$(NB_DB_PASS) dbname=netbird_events sslmode=require"
            - name: NB_AUTHSTORE_DSN
              value: "host=netbird-db-rw port=5432 user=$(NB_DB_USER) password=$(NB_DB_PASS) dbname=netbird_idp sslmode=require"
          volumeMounts:
            - name: config-template
              mountPath: /tpl
              readOnly: true
            - name: rendered-config
              mountPath: /etc/netbird
      containers:
        - name: netbird-server
          image: netbirdio/netbird-server:0.70.5
          args:
            - --config
            - /etc/netbird/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: healthcheck
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: healthcheck
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: healthcheck
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: rendered-config
              mountPath: /etc/netbird
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
      volumes:
        - name: config-template
          configMap:
            name: netbird-server-config
        - name: rendered-config
          emptyDir:
            sizeLimit: 1Mi
        - name: data
          persistentVolumeClaim:
            claimName: netbird-server-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-dashboard
  labels:
    app.kubernetes.io/name: netbird-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbird-dashboard
    spec:
      containers:
        - name: dashboard
          image: netbirdio/dashboard:v2.37.1
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NETBIRD_MGMT_API_ENDPOINT
              value: "https://netbird.salami.network"
            - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
              value: "https://netbird.salami.network"
            - name: AUTH_AUTHORITY
              value: "https://netbird.salami.network/oauth2"
            - name: AUTH_AUDIENCE
              value: "netbird-dashboard"
            - name: AUTH_CLIENT_ID
              value: "netbird-dashboard"
            - name: AUTH_CLIENT_SECRET
              value: ""
            - name: AUTH_SUPPORTED_SCOPES
              value: "openid profile email"
            - name: AUTH_REDIRECT_URI
              value: "/nb-auth"
            - name: AUTH_SILENT_REDIRECT_URI
              value: "/nb-silent-auth"
            - name: USE_AUTH0
              value: "false"
            - name: NETBIRD_TOKEN_SOURCE
              value: "accessToken"
            - name: NGINX_SSL_PORT
              value: "443"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

grafana:
  enabled: true
  sidecar:
    dashboards:
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
      annotations:
        grafana_folder: KPS

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubevirt:
        url: https://raw.githubusercontent.com/kubevirt/monitoring/refs/heads/main/dashboards/grafana/kubevirt-control-plane.json
        datasource: Prometheus
      argocd:
        url: https://raw.githubusercontent.com/argoproj/argo-cd/refs/heads/master/examples/dashboard.json
        datasource: Prometheus

  grafana.ini:
    server:
      root_url: https://grafana.salami.network
    users:
      auto_assign_org_role: Admin
    auth:
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      use_pkce: true
      name: Keycloak OAuth
      allow_sign_up: true
      scopes: openid email profile roles
      email_attribute_path: email
      login_attribute_path: username
      auth_url: https://auth.salami.network/realms/members/protocol/openid-connect/auth
      token_url: https://auth.salami.network/realms/members/protocol/openid-connect/token
      api_url: https://auth.salami.network/realms/members/protocol/openid-connect/userinfo
  route:
    main:
      enabled: true
      hostnames:
        - grafana.salami.network
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: gateway
          namespace: gateway-infra
          sectionName: https-wildcard
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oauth
        key: client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth
        key: client-secret

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    retention: 30d
    retentionSize: "50GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: "60Gi"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-infra
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/fulsiram/homelab.git
      path: kubernetes/services/gateway-infra
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-infra
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: warpgate-tls
  namespace: warpgate
spec:
  secretName: warpgate-tls
  issuerRef:
    kind: ClusterIssuer
    name: internal-ca
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - warpgate.warpgate.svc.cluster.local
    - warpgate.warpgate.svc
    - warpgate

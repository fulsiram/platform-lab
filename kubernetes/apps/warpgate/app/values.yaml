image:
  repository: ghcr.io/warp-tech/warpgate
  tag: "0.25.6@sha256:c7d3d3a8219d5f19dbbb6fddb55cb0ea14104085decc77c260cc273ea4833f55"
  pullPolicy: IfNotPresent

setup:
  enabled: false
  type: "podinit"

  http: 8888
  ssh: 2222
  mysql: 0
  pgsql: 0
  kubernetes: 0

  envFromSecret:
    WARPGATE_ADMIN_PASSWORD: warpgate-secret/adminPassword
    DATABASE_URL: warpgate-db-app/uri
    KEYCLOAK_CLIENT_ID: warpgate-sso/clientId
    KEYCLOAK_CLIENT_SECRET: warpgate-sso/clientSecret

  databaseUrl: "$DATABASE_URL"

data:
  pvc:
    enabled: true
    template:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 50Gi

ssh_keys_secret: "warpgate-ssh-keys"

# `tls_cert_secret` intentionally unset: the chart copies the cert into /data,
# then `warpgate unattended-setup` unconditionally overwrites it. Mount the
# secret ourselves and point warpgate at it via overrides_config (applied
# after setup).
volumes:
  - name: tls-cert
    secret:
      secretName: warpgate-tls
volume_mounts:
  - name: tls-cert
    mountPath: /tls-cert
    readOnly: true

config_env_var_replace: "DATABASE_URL KEYCLOAK_CLIENT_ID KEYCLOAK_CLIENT_SECRET"
overrides_config: |
  external_host: warpgate.salami.network
  database_url: $DATABASE_URL
  ssh:
    enable: true
    keys: /data/ssh-keys
  http:
    external_port: 443
    certificate: /tls-cert/tls.crt
    key: /tls-cert/tls.key
  recordings:
    enable: true
  sso_providers:
    - name: keycloak
      label: Keycloak
      auto_create_users: true
      provider:
        type: custom
        client_id: $KEYCLOAK_CLIENT_ID
        client_secret: $KEYCLOAK_CLIENT_SECRET
        issuer_url: https://auth.salami.network/realms/members
        scopes: ["openid", "profile", "email"]

service:
  ports:
    http: 8888
    ssh: 2222
    mysql: 0
    pgsql: 0
    kubernetes: 0

httpRoute:
  enabled: true
  parentRefs:
    - name: gateway
      namespace: gateway-infra
      sectionName: https-wildcard
  hostnames:
    - warpgate.salami.network

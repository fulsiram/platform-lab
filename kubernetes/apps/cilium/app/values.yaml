kubeProxyReplacement: true

k8sServiceHost: 162.55.238.111
k8sServicePort: 6443

nodeIPAM:
  enabled: true

ipv4:
  enabled: true
ipv6:
  enabled: true

socketLB:
  hostNamespaceOnly: true

ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.12.0.0/16
    clusterPoolIPv4MaskSize: 22

    clusterPoolIPv6PodCIDRList:
      - fd4f:d0b5:c2ab:0000::/56
    clusterPoolIPv6MaskSize: 64

dashboards:
  enabled: true
  annotations:
    grafana_folder: Cilium

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true

operator:
  replicas: 1
  dashboards:
    enabled: true
    annotations:
      grafana_folder: Cilium
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

envoy:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enabled:
      - dns:query;labelsContext=source_namespace,destination_namespace
      - drop:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
      - flow:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
      - tcp:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
      - icmp:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
      - httpV2:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
      - policy:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
    serviceMonitor:
      enabled: true

kubeProxyReplacement: true

k8sServiceHost: 162.55.238.111
k8sServicePort: 6443

nodeIPAM:
  enabled: true

ipv4:
  enabled: true
ipv6:
  enabled: true

socketLB:
  hostNamespaceOnly: true

ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.12.0.0/16
    clusterPoolIPv4MaskSize: 22

    clusterPoolIPv6PodCIDRList:
      - fd4f:d0b5:c2ab:0000::/56
    clusterPoolIPv6MaskSize: 64

dashboards:
  enabled: true
  annotations:
    grafana_folder: Cilium

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true

operator:
  replicas: 1
  dashboards:
    enabled: true
    annotations:
      grafana_folder: Cilium
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

envoy:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - flow
      - tcp
      - icmp
      - httpV2
      - policy
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
    serviceMonitor:
      enabled: true

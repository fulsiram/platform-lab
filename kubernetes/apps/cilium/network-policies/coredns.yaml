apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: coredns-visibility
spec:
  endpointSelector:
    matchExpressions:
      # Don't apply to kube-system or Cilium's own pods
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: NotIn
        values:
          - kube-system
      - key: "k8s-app"
        operator: NotIn
        values:
          - kube-dns
          - cilium
          - hubble-relay
          - hubble-ui
  enableDefaultDeny:
    ingress: false
    egress: false
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

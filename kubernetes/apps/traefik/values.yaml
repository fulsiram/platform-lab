providers:
  kubernetesGateway:
    enabled: true
    experimentalChannel: true

gateway:
  enabled: false

ports:
  ssh:
    port: 2222
    exposedPort: 2222
    protocol: TCP
    expose:
      default: true

service:
  type: LoadBalancer
  loadBalancerClass: io.cilium/node
  spec:
    externalTrafficPolicy: Local

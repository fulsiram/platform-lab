apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/fulsiram/homelab.git
      path: kubernetes/apps/kubevirt/app/
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: kubevirt
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

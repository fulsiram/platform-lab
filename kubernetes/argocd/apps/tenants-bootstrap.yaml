apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/fulsiram/homelab.git
        targetRevision: main
        directories:
          - path: kubernetes/tenants/*
  template:
    metadata:
      name: tenant-{{ .path.basenameNormalized }}
    spec:
      project: default
      source:
        repoURL: https://github.com/fulsiram/homelab.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: team-{{ .path.basenameNormalized }}
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

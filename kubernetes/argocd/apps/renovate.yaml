apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/fulsiram/platform-lab.git
      path: kubernetes/apps/renovate/app/
      targetRevision: main
      helm:
        releaseName: renovate
  destination:
    server: https://kubernetes.default.svc
    namespace: renovate
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

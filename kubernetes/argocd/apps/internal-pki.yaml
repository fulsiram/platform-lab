apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: internal-pki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fulsiram/platform-lab.git
    path: kubernetes/apps/internal-pki/
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true

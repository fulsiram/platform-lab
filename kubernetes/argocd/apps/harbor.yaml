apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: 1.19.0
      helm:
        releaseName: harbor
        valueFiles:
          - $values/kubernetes/apps/harbor/values.yaml
    - repoURL: https://github.com/fulsiram/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations."checksum/secret"
        - .spec.template.metadata.annotations."checksum/secret-core"
        - .spec.template.metadata.annotations."checksum/secret-jobservice"
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/fulsiram/homelab.git
      path: kubernetes/apps/tekton/app/
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-config
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/fulsiram/homelab.git
      path: kubernetes/apps/tekton/config/
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

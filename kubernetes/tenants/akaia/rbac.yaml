apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-akaia-dev
  namespace: team-akaia
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/logs
      - services
      - configmaps
      - events
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-akaia-devs
  namespace: team-akaia
subjects:
  - kind: Group
    name: oidc:k8s-akaia
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: team-akaia-dev
  apiGroup: rbac.authorization.k8s.io

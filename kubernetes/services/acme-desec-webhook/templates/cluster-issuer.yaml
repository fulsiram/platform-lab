apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: admin@salami.network
    # profile: tlsserver
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.salami.network
            solverName: desec
            config:
              apiTokenSecretRef:
                name: desec-api-token
                key: token
